<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>clawd</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header id="banner">
    <span class="brand">clawd</span>
    <span id="provider" class="tag"></span>
    <span id="model" class="tag accent"></span>
    <span id="branch" class="tag warn"></span>
    <span id="cost" class="tag dim"></span>
  </header>

  <main id="log"></main>

  <form id="composer">
    <textarea id="input" rows="2" placeholder="Ask clawd. Use $...$ or $$...$$ for LaTeX." autofocus></textarea>
    <button type="submit" id="send">send</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
